<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XalPlaX - Zion</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #000; /* Fondo negro profundo */
            color: #fff; 
            font-family: monospace; 
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        /* Tu Logo */
        .main-logo {
            width: 100%;
            max-width: 800px;
            display: block;
            margin: 0 auto 20px auto;
        }

        /* Contenedor de los Botones */
        nav {
            margin: 40px 0;
            display: flex;
            justify-content: center;
            gap: 30px; 
            flex-wrap: wrap; 
        }

        /* Estilo Gótico Industrial */
        nav a {
            font-family: 'UnifrakturCook', serif; /* La fuente que elegimos */
            color: #ffffff; 
            text-decoration: none; 
            font-size: 2.2rem; 
            transition: 0.3s ease; 
            letter-spacing: 2px;
            padding: 5px 10px;
        }

        /* El efecto al pasar el mouse */
        nav a:hover {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6); /* Brillo sutil */
            transform: scale(1.05); 
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <img src="plaxlogo.jpeg" alt="XalPlaX Logo" class="main-logo">

    <nav>
        <a href="#artista">ARTISTA</a>
        <a href="#tatuajes">TATUAJES</a>
        <a href="#disenos">DISEÑOS</a>
        <a href="#flashes">FLASHES</a>
        <a href="#merch">MERCH</a>
    </nav>

</body>
</html>
