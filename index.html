<!DOCTYPE html>
<html>
<head>

    <style>
     <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: monospace; 
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        /* Esto es para que tus imágenes no se rompan */
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 20px auto;
        }

        /* El contenedor de los botones */
        nav {
            margin: 40px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* Los botones Góticos y Blancos */
        nav a {
            font-family: 'UnifrakturMaguntia', serif;
            color: #ffffff; 
            text-decoration: none;
            font-size: 1.8rem;
            transition: 0.4s;
            letter-spacing: 1px;
        }

        /* Lo que pasa cuando pasás el mouse */
        nav a:hover {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            transform: scale(1.1);
            cursor: crosshair;
        }

        h1 { border-bottom: 1px solid #0f0; }
    </style>
    </style>
</head>
<body>
<img src="plaxlogo.jpeg" style="width: 100%; max-width: 800px; display: block; margin: 0 auto 20px auto;">
   <nav>
    <a href="#">ARTISTA</a>
    <a href="#">TATUAJES</a>
    <a href="#">DISEÑOS</a>
    <a href="#">FLASHES</a>
    <a href="#">MERCH</a>
</nav>
<img src="cassandra.png" alt="Proyecto Cassandra" style="max-width: 100%;">
    <p>Bienvenido al Nodo de Resistencia de XalplaX.</p>
</body>
</html>
