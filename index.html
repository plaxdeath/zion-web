<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XalPlaX - Zion</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">

    <style>
        /* El "maquillaje" de la página */
        body { 
            background-color: #000; /* Fondo negro profundo */
            color: #fff; /* Todo el texto blanco por defecto */
            font-family: monospace; 
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        /* Tu Logo (Le saqué los estilos en línea y los puse acá, más limpio) */
        .main-logo {
            width: 100%;
            max-width: 800px;
            display: block;
            margin: 0 auto 20px auto;
        }

        /* Contenedor de los Botones (para espaciarlos bien) */
        nav {
            margin: 40px 0;
            display: flex;
            justify-content: center;
            gap: 30px; /* Espacio entre cada botón */
            flex-wrap: wrap; /* Por si la pantalla es chica */
        }

        /* Estilo Gótico y Blanco de los Botones */
        nav a {
            font-family: 'UnifrakturMaguntia', serif; /* Letra gótica */
            color: #ffffff; /* Blanco puro */
            text-decoration: none; /* Sin el subrayado feo */
            font-size: 2rem; /* Tamaño grande y legible */
            transition: 0.3s ease; /* Efecto suave al pasar el mouse */
            letter-spacing: 1px;
        }

        /* El efecto al pasar la "manito" (hover) */
        nav a:hover {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7); /* Brillo neón blanco */
            transform: scale(1.1); /* Crece un poquito */
            cursor: crosshair; /* Cursor de mira de precisión */
        }
    </style>
</head>
<body>

    <img src="plaxlogo.jpeg" alt="XalPlaX Logo" class="main-logo">

    <nav>
        <a href="#artista">ARTISTA</a>
        <a href="#tatuajes">TATUAJES</a>
        <a href="#disenos">DISEÑOS</a>
        <a href="#flashes">FLASHES</a>
        <a href="#merch">MERCH</a>
    </nav>

</body>
</html>
