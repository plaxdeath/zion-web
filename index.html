<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XalPlaX - Zion</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #000; /* Fondo negro profundo */
            color: #fff; 
            font-family: monospace; 
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        /* Tu Logo */
        .main-logo {
            width: 100%;
            max-width: 800px;
            display: block;
            margin: 0 auto 20px auto;
        }

        /* Contenedor de los Botones */
        nav {
            margin: 40px 0;
            display: flex;
            justify-content: center;
            gap: 30px; 
            flex-wrap: wrap; 
        }

        /* Estilo Gótico Industrial */
        nav a {
            font-family: 'UnifrakturCook', serif; /* La fuente que elegimos */
            color: #ffffff; 
            text-decoration: none; 
            font-size: 2.2rem; 
            transition: 0.3s ease; 
            letter-spacing: 2px;
            padding: 5px 10px;
        }

        /* El efecto al pasar el mouse */
        nav a:hover {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6); /* Brillo sutil */
            transform: scale(1.05); 
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <img src="plaxlogo.jpeg" alt="XalPlaX Logo" class="main-logo">

    <nav>
        <a href="#artista">ARTISTA</a>
        <a href="#tatuajes">TATUAJES</a>
        <a href="#disenos">DISEÑOS</a>
        <a href="#flashes">FLASHES</a>
        <a href="#merch">MERCH</a>
    </nav>
<section id="artista" style="max-width: 800px; margin: 60px auto; padding: 40px; border: 1px double #333; background: rgba(10, 10, 10, 0.8);">
        
        <h2 style="font-family: 'UnifrakturCook', serif; font-size: 3rem; color: #fff; margin-bottom: 30px; letter-spacing: 3px;">
            Identidad
        </h2>

        <p style="font-family: monospace; font-size: 1.2rem; line-height: 1.6; color: #ccc; text-align: justify; border-left: 3px solid #fff; padding-left: 20px;">
            Dibujante y tatuador formado en la vieja escuela, aprendiendo a través de la disciplina y la tradición. 
            <br><br>
            Hoy mi búsqueda se funde entre lo orgánico y lo tecnológico: <span style="color: #fff; font-weight: bold;">Blackwork, biomecánica ciber-orgánica y horror.</span>
        </p>

    </section>
<section id="tatuajes" style="max-width: 1000px; margin: 80px auto; padding: 20px;">
        
        <h2 style="font-family: 'UnifrakturCook', serif; font-size: 3rem; color: #fff; margin-bottom: 40px; letter-spacing: 3px;">
            Trabajos
        </h2>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
            
            <img src="tatuajes/01.jpeg" alt="Tatuaje 1" style="width: 100%; height: 350px; object-fit: cover; border: 1px solid #333; filter: grayscale(100%); transition: 0.5s;">
            
            <img src="tatuajes/02.jpeg" alt="Tatuaje 2" style="width: 100%; height: 350px; object-fit: cover; border: 1px solid #333; filter: grayscale(100%); transition: 0.5s;">
            
            <img src="tatuajes/03.jpeg" alt="Tatuaje 3" style="width: 100%; height: 350px; object-fit: cover; border: 1px solid #333; filter: grayscale(100%); transition: 0.5s;">
            
            <img src="tatuajes/04.jpeg" alt="Tatuaje 4" style="width: 100%; height: 350px; object-fit: cover; border: 1px solid #333; filter: grayscale(100%); transition: 0.5s;">
            
            <img src="tatuajes/05.jpeg" alt="Tatuaje 5" style="width: 100%; height: 350px; object-fit: cover; border: 1px solid #333; filter: grayscale(100%); transition: 0.5s;">
            
            <img src="tatuajes/06.jpeg" alt="Tatuaje 6" style="width: 100%; height: 350px; object-fit: cover; border: 1px solid #333; filter: grayscale(100%); transition: 0.5s;">

        </div>

    </section>

</body>
</html>
